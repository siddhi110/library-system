<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {font-family: Arial; padding: 50px; background: #f5f5f5;}
        form {background: white; padding: 30px; width: 300px; margin: auto; border-radius: 10px; box-shadow: 0 0 10px #ccc;}
        input, button {width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ddd;}
        button {background: #4CAF50; color: white; border: none; cursor: pointer;}
        button:hover {opacity: 0.8;}
    </style>
</head>
<body>
<h2 style="text-align:center;">Register</h2>
<form method="POST">
    Username: <input type="text" name="username" required><br>
    Password: <input type="password" name="password" required><br>
    <button type="submit">Register</button>
</form>
<p style="text-align:center;"><a href="/login">Already account ahe? Login kara</a></p>
</body>
</html>
